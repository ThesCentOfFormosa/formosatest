<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>島嶼地息 - 台灣土壤靈魂測驗</title>
    <link rel="icon" href="logo1.png" type="image/png">
    <style>
        :root {
            --bg: #F9F7F2; 
            --primary: #4A5D4E; 
            --accent: #BC6D63; 
            --text: #3E3A39;
            --card-bg: #FFFFFF;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 550px;
            width: 100%;
            position: relative;
        }
        .logo-header { display: flex; justify-content: center; margin-bottom: 15px; }
        .main-logo { max-width: 180px; height: auto; }
        .header h1 { font-size: 1.4rem; letter-spacing: 2px; color: var(--primary); margin: 0 auto; line-height: 1.4; }
        .intro-text { font-size: 0.9rem; line-height: 1.7; color: #777; margin: 20px 0; }
        .progress-container { height: 4px; background: #EEE; border-radius: 2px; margin: 25px auto; }
        #progress { height: 100%; background: var(--accent); width: 0%; transition: 0.4s; }
        .question { font-size: 1.2rem; margin-bottom: 25px; font-weight: 600; color: var(--primary); }
        .options { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .opt-btn {
            padding: 16px 20px;
            border: 1px solid #EAEAEA;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            color: var(--text);
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        #result { display: none; animation: fadeIn 0.8s ease; text-align: center; }
        .result-img { max-width: 100%; border-radius: 15px; margin: 20px 0; border: 1px solid #EEE; }
        .soil-name { font-size: 1.8rem; color: var(--primary); margin: 10px 0; font-weight: bold; }
        .scent-title { font-size: 1.5rem; color: var(--accent); margin: 20px 0 10px; font-weight: bold; border-top: 1px dashed #DDD; padding-top: 20px; }
        .info-box { background: #F4F4F4; padding: 20px; border-radius: 15px; font-size: 0.9rem; line-height: 1.8; margin: 15px 0; text-align: center; }
        .scent-desc { font-size: 0.95rem; line-height: 1.7; color: #555; text-align: center; margin-top: 15px; padding: 0 10px; }
        .gift-box { background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-top: 30px; }
        .social-card { margin: 25px 0; padding: 20px; border: 2px solid #F0F0F0; border-radius: 20px; background: #FFF; }
        .social-card p { font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; color: var(--text); }
        .ig-link-btn {
            background: var(--ig-gradient);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3);
            transition: transform 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) {
            #quiz-container { padding: 30px 20px; }
            .main-logo { max-width: 150px; }
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="logo-header"><img src="logo.png" alt="島嶼地息" class="main-logo"></div>
    <div class="header" id="main-header">
        <h1>測試看看你是哪種土壤?</h1>
        <div id="intro-box" class="intro-text">
            《島嶼地息》是一項以「台灣土壤多樣性」為核心的感官計畫。台灣雖然面積不大，卻因劇烈的地形變化與氣候，孕育出世界 12 類土綱中的 11 種，被譽為「微型土壤博物館」。來測試看看你的靈魂對應哪種土地吧！
        </div>
    </div>
    <div id="start-screen">
        <button class="opt-btn" style="background:var(--primary); color:white;" onclick="startQuiz()">開啟測驗</button>
    </div>
    <div id="quiz-body">
        <div class="progress-container"><div id="progress"></div></div>
        <div id="q-text" class="question"></div>
        <div id="q-options" class="options"></div>
    </div>
    <div id="result">
        <h2 class="soil-name" id="res-name"></h2>
        <div id="res-scent-content"></div>
        
        <div class="gift-box">
            <h3 style="margin-top:0;">🎁 測驗限定禮</h3>
            <p>IG截圖分享並@島嶼地息限動至展覽現場<br>即可領取小禮物一份！</p>
        </div>

        <div class="social-card">
            <p>📸 追蹤我們，探索更多故事</p>
            <a href="https://www.instagram.com/the_scent_of_formosa" target="_blank" class="ig-link-btn">
                @the_scent_of_formosa
            </a>
        </div>

        <button class="opt-btn" style="background:var(--bg);" onclick="location.reload()">再測一次</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. 當你獨自旅行，最能讓你感到安心的景色是？", options: [
            { t: "海邊的出海口與平坦的沙灘", s: [1] },
            { t: "深山裡長滿青苔的潮濕森林", s: [2, 4] },
            { t: "一眼望不到盡頭的開闊平原", s: [8, 9] },
            { t: "充滿歷史感與風化痕跡的台地", s: [10, 11] }
        ]},
        { q: "2. 面對一件需要長時間投入的事，你的表現是？", options: [
            { t: "熱情來得快，但也容易轉移目標", s: [1] },
            { t: "需要適當的壓力或動力才能推動", s: [9] },
            { t: "非常有韌性，能熬過漫長的磨練", s: [10, 11] },
            { t: "情緒與靈感是我的主要驅動力", s: [6, 2] }
        ]},
        { q: "3. 你最喜歡哪種形式的聚會？", options: [
            { t: "質感優雅的餐廳，聊有深度的話題", s: [7, 3] },
            { t: "隨興的野餐，哪裡舒服就待哪裡", s: [1] },
            { t: "與知己好友在幽靜的角落談心", s: [4, 2, 8] },
            { t: "討論非常熱烈、充滿火花的對話", s: [6, 3] }
        ]},
        { q: "4. 當你遇到不順心的事，你的第一反應通常是？", options: [
            { t: "情緒波折明顯，會想宣洩出來", s: [6] },
            { t: "冷靜分析現況，尋求務實的出口", s: [5, 8, 11] },
            { t: "躲進自己的殼裡，安靜消化", s: [4, 2] },
            { t: "雖然酸楚，但會默默忍耐並轉化", s: [10, 3] }
        ]},
        { q: "5. 你偏好的生活空間風格是？", options: [
            { t: "極簡、不堆積多餘東西的空間", s: [11, 4] },
            { t: "溫暖、充滿生活感與回憶物件", s: [2, 8] },
            { t: "有設計感、帶點閃光點的裝飾", s: [3, 7] },
            { t: "功能性強、各司其職的有序空間", s: [9, 5] }
        ]},
        { q: "6. 關於金錢與資源的態度，你傾向？", options: [
            { t: "有多少花多少，不太有危機感", s: [1] },
            { t: "精打細算，確保花在刀口上", s: [5, 11] },
            { t: "願意為了高品質的生活付出成本", s: [7, 3] },
            { t: "喜歡累積與收藏，看著存款增加", s: [2, 9] }
        ]},
        { q: "7. 在團隊合作中，你通常扮演什麼樣的角色？", options: [
            { t: "機動性最強的支援者", s: [1, 8] },
            { t: "穩定軍心的壓艙石", s: [11, 10] },
            { t: "追求完美的品質控管者", s: [7, 9] },
            { t: "提供獨特視角的創意者", s: [3, 6] }
        ]}
    ];
    
    const soilData = {
        3: { 
            name: "灰燼土 Andisols", 
            traits: "由火山灰發育而成，保水保肥性佳，土質鬆軟且具有閃閃發光的礦物特性。",
            analysis: "你是個帶有磁場的人，平時安靜沉穩，但內心隱藏著驚人的能量（爆發力）。你天生帶有閃光點，總能在人群中展現獨特的質感。",
            img: "1.png",
            scent: "《柑影之丘》",
            tagline: "灰燼暖土上的金色果夢⋆.𐙚 ̊",
            details: "<b>香調：</b>柑橘木質調<br><b>元素：</b>草山桶柑、草山紅茶、灰燼土",
            poem: "晨霧墜落，土壤尚溫，老農伏身撫觸根系，那是火山餘燼的記憶，藏於灰黑之中。<br><br>柑果垂重，似夢中金幣，紅茶焙火的香，幽幽飄過埋沒的產道。昔年榮景已逝，然風仍循老路吹過，播下來年希望的果核。"
        },
        10: { 
            name: "極育土 Ultisols", 
            traits: "長期淋洗導致酸性強且鹽基含量低。色澤紅褐，分佈於丘陵與台地，農業上需改良肥力。",
            analysis: "你是個「慢熱」且「堅毅」的人。生命經歷了許多淬煉，讓你外冷內熱。雖然不容易對人敞開心扉，但一旦認定了目標，就會展現最強的韌性。",
            img: "2.png",
            scent: "《梨山蜜語》",
            tagline: "紅棕沃土上的清甜誓言 ✮⋆˙",
            details: "<b>香調：</b>甘甜果香調<br><b>元素：</b>甘露梨、蜂蜜、極育土",
            poem: "晨曦初露，山坡梨園仍沾著露水。紅棕色的極育土裡翻耕，將高接梨嫁接上去。<br><br>夏季裡，蜂群繞枝，蜜香混著梨果氣息流淌在空氣中。"
        },
        5: { 
            name: "旱境土 Aridisols", 
            traits: "質地緻密，含有可溶性鹽類及黏粒。多見於降雨稀少、蒸發旺盛的西南沿海，易鹽鹼化。",
            analysis: "你是絕對的務實主義者。在艱困的環境中，你總能保持冷靜與精明，精準分配資源。雖然給人感覺稍微有點「鹹」（冷冽），但你的生存力最強。",
            img: "4.png",
            scent: "《鹽地柚香》",
            tagline: "白鹽炙土上的清苦甘露 °⭒˚｡⋆",
            details: "<b>香調：</b>柑橘海洋調<br><b>元素：</b>文旦柚子、海鹽、旱境土",
            poem: "踩在結晶白鹽覆蓋的土地上，聽見腳下微微的脆裂聲。<br><br>旁邊果園裡，熟透的文旦柚發散微苦帶甜的香氣，與海風吹來的鹹氣交織。"
        },
        6: { 
            name: "膨轉土 Vertisols", 
            traits: "黏粒含量極高，潮濕時膨脹，乾燥時龜裂，變動時會發出聲響。",
            analysis: "你是情緒張力極強的藝術家性格。投入時比誰都熱情，受傷時裂痕也比誰都深刻。你的靈魂會跟著大地的律動起伏，擁有鮮活的生命力。",
            img: "3.png",
            scent: "《山林脈動》",
            tagline: "呼吸大地裡的辛香心跳 𓆩❤︎𓆪",
            details: "<b>香調：</b>溫潤木質調<br><b>元素：</b>馬告、森林草木、膨轉土",
            poem: "走在森林裡，口中嚼著帶辣香的馬告，耳邊是溪水聲與蟲鳴。<br><br>裂縫裡滋養的新芽、林間的清新與辛香，都是自然最直接的心跳。"
        },
        1: { name: "新成土 Entisols", traits: "土層淺且肥力短暫，結構鬆散。", analysis: "你是個隨興的自由靈魂，反應快但不愛受拘束。對你而言，每一刻都是新的冒險。" },
        2: { name: "有機質土 Histosols", traits: "富含腐植質，色深鬆軟，保水力強。", analysis: "你是溫柔的感性收藏家，內心柔軟，能深刻共情他人的苦與樂，但也容易累積過多的情感包袱。" },
        4: { name: "淋澱土 Spodosols", traits: "高山森林土，酸性強，層次分明。", analysis: "你是孤傲的高山隱士，追求精神的極致純粹，守護著內心那一座靜謐的原始森林。" },
        7: { name: "黑沃土 Mollisols", traits: "肥力極高，結構良好，鹽基豐富。", analysis: "優雅的知性貴族，涵養深厚、處事圓融。是那種「不管放哪都能長得很好」的優質靈魂。" },
        8: { name: "弱育土 Inceptisols", traits: "層次清晰利用廣，是台灣分佈最廣的土。", analysis: "你是多才多藝的公約數，適應力強，是如大地般穩定且不可或缺的支柱。" },
        9: { name: "淋溶土 Alfisols", traits: "質地較硬，需經淋洗啟發後方能耕種。", analysis: "你是慢熱的實力派，需要時間與信任的洗禮，才會在適當的契機下展現驚人的能量。" },
        11: { name: "氧化物土 Oxisols", traits: "高度風化之終極型態，質地最為堅硬。", analysis: "你是終極的守護老將，已經歷過風霜，性格如鋼鐵般穩定不可動搖，是強大的存在。" }
    };

    let currentQ = 0;
    let scores = {};

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('quiz-body').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-text').innerText = (currentQ+1) + ". " + q.q;
        const optDiv = document.getElementById('q-options');
        optDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                opt.s.forEach(s => scores[s] = (scores[s] || 0) + 1);
                nextStep();
            };
            optDiv.appendChild(btn);
        });
        document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
        window.scrollTo(0,0);
    }

    function nextStep() {
        currentQ++;
        if(currentQ < questions.length) { showQuestion(); } else { showResult(); }
    }

    function showResult() {
        document.getElementById('quiz-body').style.display = 'none';
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        let data = soilData[winner];
        document.getElementById('res-name').innerText = data.name;
        let content = "";
        
        content += `<div class="info-box"><strong>土壤特質：</strong><br>${data.traits}</div>`;
        content += `<div class="info-box" style="background:#F9FAF9; border:1px solid #E6EEE6;"><strong>靈魂解析：</strong><br>${data.analysis}</div>`;

        if([3, 10, 5, 6].includes(parseInt(winner))) {
            content += `
                <div class="scent-title">${data.scent}</div>
                <img src="${data.img}" class="result-img">
                <p style="font-weight:bold; color:var(--primary); margin: 10px 0;">${data.tagline}</p>
                <div class="info-box" style="background:#FFF9F7; border:1px solid #FFEBE6;">${data.details}</div>
                <div class="scent-desc">${data.poem}</div>
            `;
        } else {
            content += `<p style="font-style:italic; color:#777; margin-top:20px;">「探尋島嶼間最純粹的氣息。」</p>`;
        }
        
        document.getElementById('res-scent-content').innerHTML = content;
        document.getElementById('result').style.display = 'block';
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
